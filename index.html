<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grind Log">
<meta name="theme-color" content="#0e0e0e">
<title>Grind Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "Grind Log",
  short_name: "Grind Log",
  description: "Track your protein days and gym streak",
  start_url: ".",
  display: "standalone",
  background_color: "#0e0e0e",
  theme_color: "#0e0e0e",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230e0e0e'/><text y='130' x='20' font-size='120'>🔥</text></svg>", sizes: "192x192", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestUrl = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestUrl;
document.head.appendChild(link);
</script>

<style>
  :root {
    --yellow: #e8ff5a;
    --green: #4ade80;
    --blue: #60a5fa;
    --bg: #0e0e0e;
    --card: #161616;
    --border: #222;
    --muted: #555;
    --dim: #444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); overscroll-behavior: none; }
  body {
    font-family: 'DM Mono', monospace;
    max-width: 430px;
    margin: 0 auto;
    color: #fff;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .app { min-height: 100vh; padding-bottom: 90px; }

  /* Header */
  .header { padding: 52px 24px 16px; background: linear-gradient(180deg, #141414 0%, var(--bg) 100%); }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--yellow); letter-spacing: 5px; line-height: 1; }
  .header-date { font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: 2.5px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 16px 18px; }
  .stat-card { background: var(--card); border-radius: 16px; padding: 16px 8px; text-align: center; border: 1px solid var(--border); }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; }
  .stat-label { font-size: 7.5px; color: var(--muted); letter-spacing: 1.5px; margin-top: 5px; text-transform: uppercase; }
  .stat-unit { font-size: 7px; color: var(--dim); margin-top: 2px; }

  /* Cards */
  .card { margin: 0 16px 12px; border-radius: 20px; padding: 20px; border: 2px solid var(--border); background: var(--card); transition: border-color 0.3s, background 0.3s; }
  .card.active-protein { background: linear-gradient(135deg, #1a2e1a, #162616); border-color: var(--green); }
  .card.active-gym { background: linear-gradient(135deg, #1a1f2e, #141b2e); border-color: var(--blue); }
  .card-row { display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 2px; color: #666; transition: color 0.3s; }
  .card.active-protein .card-title { color: var(--green); }
  .card.active-gym .card-title { color: var(--blue); }
  .card-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .card-note { margin-top: 12px; font-size: 10.5px; border-top: 1px solid #1e3a1e; padding-top: 12px; color: var(--green); }
  .card-note-blue { border-top-color: #1e273a; color: var(--blue); }

  /* Big toggle button */
  .big-btn {
    width: 58px; height: 58px; border-radius: 16px; border: none; cursor: pointer;
    font-size: 26px; display: flex; align-items: center; justify-content: center;
    transition: background 0.25s, transform 0.1s;
    background: #222;
    color: #555;
    flex-shrink: 0;
  }
  .big-btn:active { transform: scale(0.93); }
  .big-btn.on-protein { background: var(--green); color: #111; }
  .big-btn.on-gym { background: var(--blue); color: #111; }
  .big-btn:disabled { opacity: 0.5; cursor: default; }

  /* Location settings */
  .loc-card { margin: 0 16px 12px; border-radius: 16px; padding: 14px 16px; border: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: space-between; }
  .loc-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .loc-val { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .loc-val.set { color: var(--yellow); }
  .loc-btn { background: var(--yellow); color: #111; border: none; border-radius: 10px; padding: 9px 14px; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: transform 0.1s; white-space: nowrap; }
  .loc-btn:active { transform: scale(0.95); }
  .loc-btn:disabled { opacity: 0.6; }

  /* Week bar */
  .week-section { padding: 0 16px 16px; }
  .section-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; }
  .week-grid { display: flex; gap: 6px; }
  .week-day { flex: 1; text-align: center; }
  .week-day-label { font-size: 8px; color: var(--dim); margin-bottom: 6px; letter-spacing: 1px; }
  .week-day-label.today { color: var(--yellow); }
  .week-bar {
    height: 46px; border-radius: 10px; background: #1a1a1a;
    border: 2px solid transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    font-size: 11px; transition: background 0.3s;
  }
  .week-bar.today { border-color: var(--yellow); }
  .week-bar.has-both { background: var(--yellow); }
  .week-bar.has-protein { background: var(--green); }
  .week-bar.has-gym { background: var(--blue); }
  .week-bar.future { background: #111; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: #111; border-top: 1px solid var(--border);
    display: flex; padding: 10px 0;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .nav-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; }
  .nav-btn:active { opacity: 0.7; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 8.5px; letter-spacing: 2px; color: var(--dim); font-family: 'DM Mono', monospace; font-weight: 700; }
  .nav-label.active { color: var(--yellow); }
  .nav-dot { width: 20px; height: 2px; background: var(--yellow); border-radius: 1px; margin-top: 2px; }

  /* Calendar */
  .cal-section { padding: 0 16px 24px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav-btn { background: none; border: none; color: var(--yellow); font-size: 30px; cursor: pointer; padding: 0 12px; line-height: 1; }
  .cal-month-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--yellow); letter-spacing: 2px; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
  .cal-dow-cell { text-align: center; font-size: 9px; color: var(--dim); font-weight: 700; padding-bottom: 4px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    border-radius: 8px; padding: 7px 2px 5px; text-align: center;
    font-size: 12px; border: 2px solid transparent; background: transparent;
    color: #666; line-height: 1;
  }
  .cal-cell.today { border-color: var(--yellow); color: var(--yellow); font-weight: 900; }
  .cal-cell.has-protein { background: var(--green); color: #111; }
  .cal-cell.has-gym { background: var(--blue); color: #111; }
  .cal-cell.has-both { background: var(--yellow); color: #111; }
  .cal-cell .cal-icon { font-size: 7px; display: block; margin-top: 2px; }
  .cal-legend { display: flex; gap: 16px; margin-top: 16px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Install banner */
  .install-banner {
    margin: 0 16px 12px; padding: 14px 16px; background: #1a1a00; border: 1px solid #3a3a00;
    border-radius: 14px; display: flex; align-items: flex-start; gap: 12px;
  }
  .install-banner-text { font-size: 10px; color: #aaa; line-height: 1.7; }
  .install-banner-text strong { color: var(--yellow); }
  .install-close { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; margin-left: auto; padding: 0 0 0 8px; }

  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .pop { animation: pop 0.45s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  proteinDays: {},
  gymDays: {},
  gymLocation: null,
  view: 'home',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  locationStatus: '',
  showInstall: true,
};

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

function loadAll() {
  state.proteinDays = load('proteinDays', {});
  state.gymDays     = load('gymDays', {});
  state.gymLocation = load('gymLocation', null);
  state.showInstall = load('showInstall', true);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function calcStreak() {
  let streak = 0, d = new Date();
  while (state.proteinDays[dateStr(d)]) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function totalProtein() { return Object.values(state.proteinDays).filter(Boolean).length; }

function getWeekStart(str) {
  const d = new Date(str);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return dateStr(d);
}

function gymThisWeek() {
  const ws = getWeekStart(todayStr());
  return Object.keys(state.gymDays).filter(d => state.gymDays[d] && d >= ws && d <= todayStr()).length;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function toggleProtein() {
  const t = todayStr();
  state.proteinDays[t] = !state.proteinDays[t];
  save('proteinDays', state.proteinDays);
  render();
  if (state.proteinDays[t]) popAnimate('protein-btn');
}

function setGymHere() {
  state.locationStatus = '📡 Getting location…';
  render();
  navigator.geolocation.getCurrentPosition(pos => {
    state.gymLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    save('gymLocation', state.gymLocation);
    state.locationStatus = `✓ Gym saved!`;
    render();
  }, () => {
    state.locationStatus = '❌ Location access denied. Check browser permissions.';
    render();
  }, { enableHighAccuracy: true });
}

function checkInGym() {
  if (!state.gymLocation) { state.locationStatus = '⚠️ Set your gym location first!'; render(); return; }
  state.locationStatus = '📡 Checking your location…';
  render();
  navigator.geolocation.getCurrentPosition(pos => {
    const dist = haversine(pos.coords.latitude, pos.coords.longitude, state.gymLocation.lat, state.gymLocation.lng);
    if (dist <= 300) {
      state.gymDays[todayStr()] = true;
      save('gymDays', state.gymDays);
      state.locationStatus = `🏋️ Checked in! (${Math.round(dist)}m from gym)`;
      popAnimate('gym-btn');
    } else {
      state.locationStatus = `📍 You're ${Math.round(dist)}m away (need <300m)`;
    }
    render();
  }, () => {
    state.locationStatus = '❌ Location access denied.';
    render();
  }, { enableHighAccuracy: true });
}

function popAnimate(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
}

function navigate(view) { state.view = view; render(); }

function calPrev() {
  if (state.calMonth === 0) { state.calYear--; state.calMonth = 11; }
  else state.calMonth--;
  render();
}
function calNext() {
  if (state.calMonth === 11) { state.calYear++; state.calMonth = 0; }
  else state.calMonth++;
  render();
}

function dismissInstall() {
  state.showInstall = false;
  save('showInstall', false);
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildHTML();
  attachEvents();
}

function buildHTML() {
  const today = todayStr();
  const tp = !!state.proteinDays[today];
  const tg = !!state.gymDays[today];
  const streak = calcStreak();

  const dateLabel = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }).toUpperCase();

  const installBanner = state.showInstall ? `
    <div class="install-banner">
      <div class="install-banner-text">
        <strong>📲 Install this app</strong><br>
        <strong>iPhone:</strong> tap the Share button → "Add to Home Screen"<br>
        <strong>Android:</strong> tap ⋮ menu → "Add to Home screen"
      </div>
      <button class="install-close" onclick="dismissInstall()">✕</button>
    </div>` : '';

  const homeView = `
    <div class="fade-in">
      ${installBanner}
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" style="color:var(--yellow)">${streak}</div>
          <div class="stat-label">Streak</div>
          <div class="stat-unit">days 🔥</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--green)">${totalProtein()}</div>
          <div class="stat-label">Total</div>
          <div class="stat-unit">protein days</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--blue)">${gymThisWeek()}</div>
          <div class="stat-label">Gym</div>
          <div class="stat-unit">this week</div>
        </div>
      </div>

      <!-- Protein Card -->
      <div class="card ${tp ? 'active-protein' : ''}">
        <div class="card-row">
          <div>
            <div class="card-title">High Protein Today</div>
            <div class="card-sub">${tp ? '✓ logged for today' : 'tap to mark as done'}</div>
          </div>
          <button id="protein-btn" class="big-btn ${tp ? 'on-protein' : ''}" onclick="toggleProtein()">
            ${tp ? '🥩' : '○'}
          </button>
        </div>
        ${streak > 1 ? `<div class="card-note">🔥 ${streak} day streak — keep it going!</div>` : ''}
      </div>

      <!-- Gym Card -->
      <div class="card ${tg ? 'active-gym' : ''}">
        <div class="card-row">
          <div>
            <div class="card-title">Gym Today</div>
            <div class="card-sub">${tg ? '✓ checked in today' : state.gymLocation ? 'tap to verify location' : 'set gym location below'}</div>
          </div>
          ${tg
            ? `<div class="big-btn on-gym" style="cursor:default">🏋️</div>`
            : `<button id="gym-btn" class="big-btn" onclick="checkInGym()" style="${state.gymLocation ? 'background:#1a2540;color:var(--blue)' : ''}">📍</button>`
          }
        </div>
        ${state.locationStatus ? `<div class="card-note card-note-blue">${state.locationStatus}</div>` : ''}
      </div>

      <!-- Gym Location -->
      <div class="loc-card">
        <div>
          <div class="loc-label">Gym Location</div>
          <div class="loc-val ${state.gymLocation ? 'set' : ''}">
            ${state.gymLocation
              ? `${state.gymLocation.lat.toFixed(4)}°, ${state.gymLocation.lng.toFixed(4)}°`
              : 'not set — go to your gym and tap'}
          </div>
        </div>
        <button class="loc-btn" onclick="setGymHere()" id="set-gym-btn">
          ${state.gymLocation ? 'UPDATE' : 'SET HERE'}
        </button>
      </div>

      <!-- Week View -->
      <div class="week-section">
        <div class="section-label">This Week</div>
        <div class="week-grid">
          ${buildWeekGrid()}
        </div>
      </div>
    </div>`;

  const calView = `
    <div class="cal-section fade-in">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">‹</button>
        <div class="cal-month-title">${new Date(state.calYear, state.calMonth).toLocaleString('default',{month:'long',year:'numeric'}).toUpperCase()}</div>
        <button class="cal-nav-btn" onclick="calNext()">›</button>
      </div>
      ${buildCalendar()}
    </div>`;

  return `
    <div class="header">
      <div class="header-title">GRIND LOG</div>
      <div class="header-date">${dateLabel}</div>
    </div>
    ${state.view === 'home' ? homeView : calView}
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="navigate('home')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label ${state.view==='home' ? 'active' : ''}">TODAY</span>
        ${state.view==='home' ? '<div class="nav-dot"></div>' : ''}
      </button>
      <button class="nav-btn" onclick="navigate('calendar')">
        <span class="nav-icon">📅</span>
        <span class="nav-label ${state.view==='calendar' ? 'active' : ''}">HISTORY</span>
        ${state.view==='calendar' ? '<div class="nav-dot"></div>' : ''}
      </button>
    </nav>`;
}

function buildWeekGrid() {
  const today = todayStr();
  const d = new Date();
  const dow = d.getDay();
  const days = ['M','T','W','T','F','S','S'];
  let html = '';
  for (let i = 0; i < 7; i++) {
    const offset = i - (dow === 0 ? 6 : dow - 1);
    const day = new Date(d); day.setDate(d.getDate() + offset);
    const str = dateStr(day);
    const hasP = !!state.proteinDays[str];
    const hasG = !!state.gymDays[str];
    const isToday = str === today;
    const isFuture = str > today;
    const cls = ['week-bar',
      isToday ? 'today' : '',
      !isFuture && hasP && hasG ? 'has-both' : hasP && !isFuture ? 'has-protein' : hasG && !isFuture ? 'has-gym' : '',
      isFuture ? 'future' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="week-day">
      <div class="week-day-label ${isToday ? 'today' : ''}">${days[i]}</div>
      <div class="${cls}">
        ${!isFuture && hasP ? '<span>🥩</span>' : ''}
        ${!isFuture && hasG ? '<span>🏋️</span>' : ''}
      </div>
    </div>`;
  }
  return html;
}

function buildCalendar() {
  const { calYear: y, calMonth: m } = state;
  const today = todayStr();
  const firstDow = new Date(y, m, 1).getDay();
  const blanks = firstDow === 0 ? 6 : firstDow - 1;
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  let cells = '';
  for (let i = 0; i < blanks; i++) cells += '<div></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const str = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hasP = !!state.proteinDays[str];
    const hasG = !!state.gymDays[str];
    const isToday = str === today;
    const cls = ['cal-cell',
      isToday ? 'today' : '',
      hasP && hasG ? 'has-both' : hasP ? 'has-protein' : hasG ? 'has-gym' : ''
    ].filter(Boolean).join(' ');
    const icon = hasP && hasG ? '🔥' : hasP ? '🥩' : hasG ? '🏋️' : '';
    cells += `<div class="${cls}">${day}${icon ? `<span class="cal-icon">${icon}</span>` : ''}</div>`;
  }

  return `
    <div class="cal-dow">
      ${['M','T','W','T','F','S','S'].map(d=>`<div class="cal-dow-cell">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Protein 🥩</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Gym 🏋️</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Both 🔥</div>
    </div>`;
}

function attachEvents() {
  // all onclick handlers are global functions, already attached
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadAll();
render();

// Service Worker for offline use
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'grind-log-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './grind-log.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
